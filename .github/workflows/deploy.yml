name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to jarvis-vps
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /home/jarvis/apps/jarvis
            cd /home/jarvis/apps/jarvis
            git fetch origin main
            if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
              git stash push -u -m "pre-deploy-autostash-${GITHUB_SHA}"
            fi
            git reset --hard origin/main
            cd deploy
            docker compose up -d --build jarvis
            echo "✅ JARVIS deployed at $(date)"
