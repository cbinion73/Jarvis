name: Server Disk Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show sizes only, delete nothing)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup jarvis-vps disk
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            echo "=== DISK BEFORE ==="
            df -h /

            echo ""
            echo "=== TOP DATA FILE CONSUMERS ==="
            du -sh /home/jarvis/apps/jarvis/data/* 2>/dev/null | sort -rh | head -20

            echo ""
            echo "=== DOCKER DISK USAGE ==="
            docker system df

            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo ""
              echo "=== DRY RUN — no files deleted ==="

              echo "--- Docker volume sizes ---"
              docker system df -v 2>/dev/null | grep -A50 "Local Volumes"

              echo ""
              echo "--- jarvis_data volume contents ---"
              docker run --rm -v jarvis-family_jarvis_data:/data alpine sh -c "du -sh /data/* 2>/dev/null | sort -rh | head -20"

              echo ""
              echo "--- Large JSONL files in jarvis_data (>100MB) ---"
              docker run --rm -v jarvis-family_jarvis_data:/data alpine find /data -name "*.jsonl" -size +100M -exec du -sh {} \;

              echo ""
              echo "--- Drill into agents ---"
              docker run --rm -v jarvis-family_jarvis_data:/data alpine sh -c "du -sh /data/agents/* 2>/dev/null | sort -rh | head -20"

              echo ""
              echo "--- Drill into settings ---"
              docker run --rm -v jarvis-family_jarvis_data:/data alpine sh -c "du -sh /data/settings/* 2>/dev/null | sort -rh | head -20"

              echo ""
              echo "--- Drill into security ---"
              docker run --rm -v jarvis-family_jarvis_data:/data alpine sh -c "du -sh /data/security/* 2>/dev/null | sort -rh | head -20"

              echo ""
              echo "--- File count by directory ---"
              docker run --rm -v jarvis-family_jarvis_data:/data alpine sh -c "for d in agents settings security logs catalyst system; do echo \"\$(find /data/\$d -type f 2>/dev/null | wc -l) files in \$d\"; done"
            else
              echo ""
              echo "=== STEP 1: Truncate runaway JSONL logs in Docker volume ==="
              docker run --rm -v jarvis-family_jarvis_data:/data alpine sh -c '
                truncate_log() {
                  f="$1"
                  if [ -f "$f" ]; then
                    size=$(du -sh "$f" | cut -f1)
                    echo "Truncating $f ($size)"
                    > "$f"
                  fi
                }
                # Runaway state logs — safe to clear (current state lives in .json files)
                truncate_log /data/agents/event_bus_state_log.jsonl
                truncate_log /data/agents/background_state_log.jsonl
                truncate_log /data/agents/tick_log.jsonl
                truncate_log /data/agents/event_bus_log.jsonl
                truncate_log /data/settings/assistant_core_log.jsonl
                truncate_log /data/settings/assistant_core_state_log.jsonl
                truncate_log /data/settings/adaptation_profiles_log.jsonl
                truncate_log /data/settings/adaptation_profiles_state_log.jsonl
                truncate_log /data/settings/identity_log.jsonl
                truncate_log /data/settings/identity_state_log.jsonl
                truncate_log /data/security/weather_advisories_log.jsonl
                # Any remaining *_log.jsonl or *_state_log.jsonl over 10MB
                find /data -name "*_log.jsonl" -size +10M | while read f; do
                  size=$(du -sh "$f" | cut -f1)
                  echo "Truncating leftover $f ($size)"
                  > "$f"
                done
                find /data -name "*_state_log.jsonl" -size +10M | while read f; do
                  size=$(du -sh "$f" | cut -f1)
                  echo "Truncating leftover $f ($size)"
                  > "$f"
                done
                echo "Volume log truncation complete."
              '

              echo ""
              echo "=== STEP 2: Remove .lock files from volume ==="
              docker run --rm -v jarvis-family_jarvis_data:/data alpine sh -c '
                find /data -name "*.lock" | while read f; do
                  echo "Removing $f"
                  rm -f "$f"
                done
                echo "Lock cleanup complete."
              '

              echo ""
              echo "=== STEP 3: Docker build cache prune (not volumes) ==="
              docker builder prune -af
              echo "Build cache pruned."

              echo ""
              echo "=== DISK AFTER ==="
              df -h /
              echo ""
              echo "--- Volume sizes after ---"
              docker system df -v 2>/dev/null | grep jarvis

              echo ""
              echo "=== STEP 4: Restart JARVIS container to pick up clean state ==="
              cd /home/jarvis/apps/jarvis/deploy
              docker compose restart jarvis
              echo "✅ Volume cleanup + restart done at $(date)"
            fi
