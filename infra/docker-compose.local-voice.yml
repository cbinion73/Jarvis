services:
  localai:
    image: localai/localai:latest
    container_name: jarvis-localai
    ports:
      - "8080:8080"
    environment:
      DEBUG: "false"
    volumes:
      - ./localai/models:/models
      - ./localai/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 30s
