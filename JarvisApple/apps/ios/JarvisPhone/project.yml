name: JarvisPhone
options:
  bundleIdPrefix: com.binion
  deploymentTarget:
    iOS: "26.4"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  JarvisApple:
    path: "../../.."

targets:

  # ─────────────────────────────────────────────
  # iPhone app
  # ─────────────────────────────────────────────
  JarvisPhone:
    type: application
    platform: iOS
    deploymentTarget: "26.4"
    sources:
      - path: JarvisPhone
    resources:
      - path: JarvisPhone/Resources
    info:
      path: JarvisPhone/Info.plist
      properties:
        CFBundleName: JARVIS
        CFBundleDisplayName: JARVIS
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIImageName: ""
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
        NSMicrophoneUsageDescription: "JARVIS uses the microphone for voice commands."
        NSHealthShareUsageDescription: "JARVIS reads your health data to give you personalised daily briefings."
        NSHealthUpdateUsageDescription: "JARVIS stores your health trends on your personal JARVIS server."
        NSLocationWhenInUseUsageDescription: "JARVIS checks your location to automatically detect when you arrive home."
        NSLocationAlwaysAndWhenInUseUsageDescription: "JARVIS uses background location for home presence detection."
        NSCalendarsFullAccessUsageDescription: "JARVIS reads your calendar so it can brief you on upcoming events."
        NSRemindersFullAccessUsageDescription: "JARVIS reads your reminders so it can surface them in your daily brief."
        NSAppleMusicUsageDescription: "JARVIS shows what you're listening to in your personal dashboard."
        NSSpeechRecognitionUsageDescription: "JARVIS uses speech recognition to understand your voice commands."
        NSHomeKitUsageDescription: "JARVIS controls your smart home devices."
        NSCameraUsageDescription: "JARVIS can scan documents and QR codes for you."
        UIBackgroundModes:
          - audio
          - fetch
          - remote-notification
          - location
          - processing
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: JarvisPhone/JarvisPhone.entitlements
      properties:
        com.apple.developer.weatherkit: true
        com.apple.developer.homekit: true
        com.apple.developer.siri: true
        com.apple.developer.carplay-voice-based-conversation: true
        com.apple.security.application-groups:
          - group.com.binion.jarvisphone
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        aps-environment: production
    dependencies:
      - package: JarvisApple
        product: JarvisKit
      - package: JarvisApple
        product: JarvisKitHealth
      - package: JarvisApple
        product: JarvisKitIntents
      - package: JarvisApple
        product: JarvisNotifications
      - sdk: NetworkExtension.framework
      - sdk: CoreLocation.framework
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - sdk: WeatherKit.framework
      - sdk: EventKit.framework
      - sdk: MediaPlayer.framework
      - sdk: Speech.framework
      - sdk: HomeKit.framework
      - sdk: Vision.framework
      - sdk: SoundAnalysis.framework
      - sdk: CoreML.framework
      - sdk: NaturalLanguage.framework
      - sdk: ActivityKit.framework
      - target: JarvisWatch
        embed: true
      - target: JarvisWidgetExtension
        embed: true
      - target: JarvisNotificationContent
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binion.jarvisphone
        DEVELOPMENT_TEAM: "LGNJ56Y22G"
        INFOPLIST_FILE: JarvisPhone/Info.plist
        CODE_SIGN_ENTITLEMENTS: JarvisPhone/JarvisPhone.entitlements
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

  # ─────────────────────────────────────────────
  # iOS Widget Extension (Home Screen + Lock Screen + Live Activity + Controls)
  # ─────────────────────────────────────────────
  JarvisWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: JarvisWidgetExtension
    info:
      path: JarvisWidgetExtension/Info.plist
      properties:
        CFBundleName: JARVIS Widgets
        CFBundleDisplayName: JARVIS Widgets
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: JarvisApple
        product: JarvisKit
      - sdk: ActivityKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binion.jarvisphone.widgets
        DEVELOPMENT_TEAM: "LGNJ56Y22G"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: JarvisWidgetExtension/JarvisWidgetExtension.entitlements

  # ─────────────────────────────────────────────
  # Notification Content Extension (approve in banner)
  # ─────────────────────────────────────────────
  JarvisNotificationContent:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: JarvisNotificationContent
    info:
      path: JarvisNotificationContent/Info.plist
      properties:
        CFBundleName: JARVIS Notification
        CFBundleDisplayName: JARVIS Notification
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            UNNotificationExtensionCategory: approval
            UNNotificationExtensionInitialContentSizeRatio: 0.5
            UNNotificationExtensionDefaultContentHidden: true
          NSExtensionPointIdentifier: com.apple.usernotifications.content-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binion.jarvisphone.notification-content
        DEVELOPMENT_TEAM: "LGNJ56Y22G"
        SWIFT_VERSION: "6.0"

  # ─────────────────────────────────────────────
  # Apple Watch app
  # ─────────────────────────────────────────────
  JarvisWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: JarvisWatch
    info:
      path: JarvisWatch/Info.plist
      properties:
        CFBundleName: JARVIS
        CFBundleDisplayName: JARVIS
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.binion.jarvisphone
    dependencies:
      - sdk: WatchConnectivity.framework
      - target: JarvisWatchComplication
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binion.jarvisphone.watchkitapp
        DEVELOPMENT_TEAM: "LGNJ56Y22G"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"

  # ─────────────────────────────────────────────
  # Watch complication (WidgetKit extension)
  # ─────────────────────────────────────────────
  JarvisWatchComplication:
    type: app-extension
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: JarvisWatchComplication
    info:
      path: JarvisWatchComplication/Info.plist
      properties:
        CFBundleName: JARVIS Complication
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.binion.jarvisphone.watchkitapp.complication
        DEVELOPMENT_TEAM: "LGNJ56Y22G"
        SWIFT_VERSION: "6.0"

schemes:
  JarvisPhone:
    build:
      targets:
        JarvisPhone: all
        JarvisWatch: all
        JarvisWatchComplication: all
        JarvisWidgetExtension: all
        JarvisNotificationContent: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
